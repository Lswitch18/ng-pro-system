# SQL configuration for FreeRADIUS
# This connects to the NG-PRO billing database

sql sql1 {
    # Database driver
    driver = "rlm_sql_sqlite"

    # Connection info - will be configured via environment or volume mount
    # For SQLite:
    dialect = sqlite
    server = "10.0.0.1"
    port = 3306
    login = "ngpro"
    password = "ngpro_pass"
    radius_db = "radius"

    # Read users from database
    readclients = yes
    tracelvl = debug

    # Table definitions
    Accounting_table = "radacct"
    AcctUniqueIdTable = "radacctid"
    PostauthTable = "radpostauth"
    AuthTable = "radcheck"
    GroupTable = "radgroupreply"
    UserGroupTable = "radusergroup"
    NASIPTable = "nas"
}
