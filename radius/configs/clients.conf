# clients.conf - RADIUS Clients Configuration
# Define network equipment (routers, switches, WiFi APs)

client localhost {
    ipaddr = 127.0.0.1
    secret = testing123
    shortname = localhost
}

client 10.0.0.0/8 {
    secret = ngpro_secret_key
    shortname = internal-network
    nastype = other
}

client 172.16.0.0/12 {
    secret = ngpro_secret_key
    shortname = docker-network
    nastype = other
}

client 192.168.0.0/16 {
    secret = ngpro_secret_key
    shortname = local-network
    nastype = other
}
