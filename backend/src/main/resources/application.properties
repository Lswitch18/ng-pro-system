spring.application.name=ng-pro-backend
spring.datasource.url=jdbc:sqlite:./data/ngpro.sqlite
spring.datasource.driverClassName=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
server.port=4001

itil.jwt.secret=ngproenterprisebillingsecretkey2024distlockcdr
logging.level.com.example.ngpro=DEBUG

# Spring Mail - Configurar variáveis de ambiente para SMTP externo
# Exemplos:
# Gmail: smtp.gmail.com (porta 587), precisa de App Password
# Outlook: smtp.office365.com (porta 587)
# Mailpit (desenvolvimento): mailpit (porta 1025)

spring.mail.host=${MAIL_HOST:mailpit}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SMTP_SSL:false}

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# RADIUS Configuration
radius.secret=testing123
radius.auth-port=1812
radius.acct-port=1813
